services:
  - type: web
    name: gmao-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://gmao-sakete.netlify.app
      - key: DATABASE_URL
        fromDatabase:
          name: gmao-db
          property: connectionString

  - type: postgresql
    name: gmao-db
    plan: free
    databaseName: gmao_db
    databaseUser: gmao_user
    ipAllowList: []