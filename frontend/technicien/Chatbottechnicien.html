<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Diagnostic Expert - GMAO Sakété</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f5e9;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
            height: 100vh;
            overflow: hidden;
        }

        .main-content { display: flex; flex-direction: column; height: 100vh; }

        /* ── HEADER ── */
        .header {
            background: #1b5e20;
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-info { flex: 1; }
        .header-title    { font-size: 18px; font-weight: bold; }
        .header-subtitle { font-size: 12px; opacity: 0.8; }
        .scan-btn {
            background: #ffd600;
            color: #1b5e20;
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .scan-btn:hover { background: #ffeb3b; transform: translateY(-2px); }

        /* ── ÉQUIPEMENT ── */
        .equipment-context {
            background: white;
            padding: 12px 16px;
            margin: 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 4px solid #1b5e20;
        }
        .equipment-context-icon { font-size: 28px; }
        .equipment-context-info { flex: 1; }
        .equipment-context-name    { font-weight: bold; font-size: 15px; }
        .equipment-context-service { font-size: 12px; color: #64748b; margin-top: 2px; }
        .clear-equipment {
            background: #e2e8f0;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }
        .clear-equipment:hover { background: #cbd5e1; }

        /* ── ACTIONS RAPIDES ── */
        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            background: white;
            overflow-x: auto;
            margin: 0 12px;
            border-radius: 16px;
            scrollbar-width: none;
        }
        .quick-actions::-webkit-scrollbar { display: none; }
        .quick-btn {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            color: #374151;
        }
        .quick-btn:hover { background: #1b5e20; color: white; border-color: #1b5e20; }

        /* ── CHAT ── */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            max-width: 88%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .message.user { align-self: flex-end; justify-content: flex-end; }
        .message.bot  { align-self: flex-start; }

        .message-content {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: #1b5e20;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.bot .message-content {
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }

        /* ── CARTE DIAGNOSTIC ── */
        .diag-card {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-left: 4px solid #f59e0b;
            border-radius: 12px;
            padding: 14px;
            margin-top: 10px;
        }
        .diag-section-title {
            font-size: 12px;
            font-weight: bold;
            color: #92400e;
            margin: 10px 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .diag-step {
            background: #f8fafc;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 13px;
            margin: 4px 0;
            border-left: 3px solid #e2e8f0;
        }
        .piece-badge {
            display: inline-block;
            background: #dcfce7;
            color: #166534;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin: 3px 3px 0 0;
        }
        .piece-badge.disponible { background: #dcfce7; color: #166534; }
        .piece-badge.indisponible { background: #fee2e2; color: #991b1b; }

        .urgence-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .urgence-badge.CRITIQUE { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .urgence-badge.HAUTE    { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
        .urgence-badge.MOYENNE  { background: #fefce8; color: #ca8a04; border: 1px solid #fef08a; }
        .urgence-badge.BASSE    { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

        /* ── BOUTONS ── */
        .action-buttons { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .btn-primary {
            background: #1b5e20; color: white; border: none;
            padding: 8px 16px; border-radius: 25px; cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .btn-primary:hover { background: #2e7d32; }
        .btn-secondary {
            background: #e2e8f0; color: #475569; border: none;
            padding: 8px 16px; border-radius: 25px; cursor: pointer; font-size: 12px;
        }
        .btn-secondary:hover { background: #cbd5e1; }
        .btn-danger {
            background: #dc2626; color: white; border: none;
            padding: 8px 16px; border-radius: 25px; cursor: pointer; font-size: 12px;
        }
        .btn-danger:hover { background: #b91c1c; }

        /* ── CARTE CONFIRMATION INTERVENTION ── */
        .confirm-card {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            padding: 14px;
            margin-top: 8px;
        }
        .confirm-card-title  { font-weight: bold; color: #166534; font-size: 14px; margin-bottom: 6px; }
        .confirm-card-detail { font-size: 13px; color: #374151; margin: 3px 0; }

        /* ── TYPING ── */
        .typing-dots span {
            display: inline-block;
            width: 7px; height: 7px;
            background: #94a3b8;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40%            { transform: translateY(-6px); }
        }

        /* ── INPUT ── */
        .input-area {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e2e8f0;
            position: sticky;
            bottom: 0;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            outline: none;
            font-size: 14px;
        }
        .input-area input:focus { border-color: #1b5e20; }
        .input-area button {
            background: #1b5e20; color: white; border: none;
            width: 46px; height: 46px; border-radius: 50%;
            cursor: pointer; font-size: 18px; flex-shrink: 0;
        }
        .input-area button:hover { background: #2e7d32; }
        .input-area button:disabled { background: #94a3b8; cursor: not-allowed; }

        @media (max-width: 768px) {
            body { margin-left: 0; }
            .message { max-width: 95%; }
            .quick-actions { margin: 0 8px; }
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="header">
        <div class="header-info">
            <div class="header-title">🔬 Diagnostic Expert</div>
            <div class="header-subtitle">Assistant technique biomédical — GMAO Sakété</div>
        </div>
        <button class="scan-btn" onclick="openScanner()">📷 Scanner QR</button>
    </div>

    <div class="equipment-context" id="equipmentContext" style="display:none;">
        <div class="equipment-context-icon">🔧</div>
        <div class="equipment-context-info">
            <div class="equipment-context-name" id="currentEquipName">-</div>
            <div class="equipment-context-service" id="currentEquipService">-</div>
        </div>
        <button class="clear-equipment" onclick="clearEquipment()">Changer</button>
    </div>

    <div class="quick-actions">
        <button class="quick-btn" onclick="quickSend('pas de mise sous tension')">⚡ Pas de tension</button>
        <button class="quick-btn" onclick="quickSend('alarme pression')">⚠️ Alarme pression</button>
        <button class="quick-btn" onclick="quickSend('écran noir')">🖥️ Écran noir</button>
        <button class="quick-btn" onclick="quickSend('bruit anormal')">🔊 Bruit anormal</button>
        <button class="quick-btn" onclick="quickSend('image floue')">📷 Image floue</button>
        <button class="quick-btn" onclick="quickSend('satO2 inexacte')">💓 SpO2 inexacte</button>
        <button class="quick-btn" onclick="quickSend('fuite')">💧 Fuite</button>
        <button class="quick-btn" onclick="quickSend('aide')">❓ Aide</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message bot">
            <div class="message-content">
                👋 <strong>Bonjour Technicien !</strong><br><br>
                Je suis votre assistant de diagnostic biomédical.<br><br>
                🔍 Scannez le QR code de l'équipement ou décrivez le symptôme observé.<br><br>
                💡 <em>Je vous guiderai vers les causes probables et la procédure d'intervention.</em>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput"
               placeholder="Décrivez le symptôme technique..."
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // ─── CONFIG ────────────────────────────────────────────
    const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';

    // ─── ÉTAT ──────────────────────────────────────────────
    let currentEquipment  = null;
    let conversationId    = null;
    let lastDiagData      = null; // Données du dernier diagnostic pour créer l'intervention

    // ─── AUTH ──────────────────────────────────────────────
    function getToken() { return localStorage.getItem('token'); }
    if (!getToken()) window.location.href = '/connexion.html';

    // ─── SIDEBAR ───────────────────────────────────────────
    function loadSidebar() {
        fetch('/composants/sidebar.html')
            .then(r => r.text())
            .then(html => document.getElementById('sidebar-container').innerHTML = html)
            .catch(() => {});
    }
    loadSidebar();

    // ─── ENVOI MESSAGE ─────────────────────────────────────
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        if (!message) return;

        input.value = '';
        setSendDisabled(true);
        addMessage(message, 'user');
        showTyping();

        try {
            // ✅ Route correcte pour le technicien
            const response = await fetch(`${API_URL}/chatbot/diagnostic`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getToken()}`
                },
                body: JSON.stringify({
                    message,
                    equipmentId: currentEquipment?.id || null,
                    conversationId
                })
            });

            hideTyping();

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                addMessage(err.reply || '❌ Erreur serveur. Réessayez.', 'bot');
                setSendDisabled(false);
                return;
            }

            const data = await response.json();
            if (data.conversationId) conversationId = data.conversationId;

            // Équipement détecté automatiquement
            if (data.data?.equipmentId && !currentEquipment) {
                await loadAndSetEquipment(data.data.equipmentId);
            }

            // Gérer les actions
            switch (data.action) {
                case 'show_diagnostic':
                    lastDiagData = data.data;
                    addDiagnosticMessage(data.reply, data.data);
                    break;

                case 'ask_symptom':
                    addMessage(data.reply, 'bot');
                    if (data.data?.equipmentId) {
                        await loadAndSetEquipment(data.data.equipmentId);
                    }
                    break;

                case 'open_scanner':
                    addMessage(data.reply, 'bot');
                    setTimeout(() => openScanner(), 1000);
                    break;

                default:
                    addMessage(data.reply, 'bot');
            }

        } catch (error) {
            hideTyping();
            console.error('Erreur diagnostic:', error);
            addMessage('❌ Connexion impossible. Vérifiez votre réseau.', 'bot');
        }

        setSendDisabled(false);
    }

    // ─── AFFICHER CARTE DIAGNOSTIC ─────────────────────────
    function addDiagnosticMessage(text, diagData) {
        const container = document.getElementById('chatContainer');
        const div = document.createElement('div');
        div.className = 'message bot';

        // Badge urgence
        const urgence = diagData?.urgence || 'MOYENNE';
        const urgenceLabels = {
            CRITIQUE: '🚨 CRITIQUE',
            HAUTE:    '⚠️ HAUTE',
            MOYENNE:  '🟡 MOYENNE',
            BASSE:    '🔵 BASSE'
        };

        // Boutons d'action selon disponibilité pièce
        let actionsHtml = '';
        if (diagData?.equipmentId) {
            const pieceBtn = diagData.pieceSuggestion
                ? `<button class="btn-primary" onclick="creerIntervention('${diagData.pieceSuggestion}')">🛠️ Créer intervention + pièce</button>`
                : `<button class="btn-primary" onclick="creerIntervention()">🛠️ Créer intervention</button>`;

            actionsHtml = `
                <div class="action-buttons">
                    ${pieceBtn}
                    <button class="btn-secondary" onclick="addMessage('Nouveau diagnostic', \'user\'); sendMessage()">🔄 Autre symptôme</button>
                </div>`;
        }

        // Formater le texte (** → <strong>, \n → <br>)
        const formatted = text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');

        div.innerHTML = `
            <div class="message-content">
                <span class="urgence-badge ${urgence}">${urgenceLabels[urgence] || urgence}</span>
                <div class="diag-card">
                    ${formatted}
                </div>
                ${actionsHtml}
            </div>`;

        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // ─── CRÉER INTERVENTION ────────────────────────────────
    async function creerIntervention(pieceSuggestion = null) {
        if (!currentEquipment && !lastDiagData?.equipmentId) {
            addMessage('❌ Aucun équipement sélectionné.', 'bot');
            return;
        }

        const equipmentId = currentEquipment?.id || lastDiagData?.equipmentId;
        setSendDisabled(true);
        showTyping();

        try {
            // ✅ Route correcte pour créer une intervention
            const response = await fetch(`${API_URL}/chatbot/intervention`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getToken()}`
                },
                body: JSON.stringify({
                    equipmentId,
                    diagnostic: lastDiagData ? `Diagnostic chatbot — Urgence: ${lastDiagData.urgence}` : 'Intervention manuelle',
                    pieceSuggestion,
                    pieceId: lastDiagData?.pieceId || null,
                    conversationId
                })
            });

            hideTyping();
            const data = await response.json();

            if (data.success) {
                showConfirmationIntervention(data);
            } else {
                addMessage(data.message || '❌ Erreur lors de la création.', 'bot');
            }

        } catch {
            hideTyping();
            addMessage('❌ Erreur réseau. Réessayez.', 'bot');
        }

        setSendDisabled(false);
    }

    // ─── CARTE CONFIRMATION INTERVENTION ──────────────────
    function showConfirmationIntervention(data) {
        const container = document.getElementById('chatContainer');
        const div = document.createElement('div');
        div.className = 'message bot';
        div.innerHTML = `
            <div class="message-content">
                <div class="confirm-card">
                    <div class="confirm-card-title">✅ Intervention créée !</div>
                    <div class="confirm-card-detail">🔧 N° Intervention : <strong>#${data.interventionId}</strong></div>
                    <div class="confirm-card-detail" style="font-size:12px; color:#6b7280; margin-top:6px;">
                        L'intervention a été assignée et est maintenant en cours.
                    </div>
                </div>
                <div class="action-buttons" style="margin-top:10px;">
                    <button class="btn-primary" onclick="window.location.href='interventions.html'">
                        📋 Voir les interventions
                    </button>
                    <button class="btn-secondary" onclick="nouveauDiagnostic()">
                        🔄 Nouveau diagnostic
                    </button>
                </div>
            </div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // ─── CHARGEMENT ÉQUIPEMENT ─────────────────────────────
    async function loadAndSetEquipment(id) {
        try {
            const res = await fetch(`${API_URL}/equipements/${id}`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            if (res.ok) {
                const eq = await res.json();
                currentEquipment = eq;
                updateEquipmentContext(eq);
            }
        } catch {}
    }

    function updateEquipmentContext(eq) {
        document.getElementById('equipmentContext').style.display = 'flex';
        document.getElementById('currentEquipName').textContent =
            `${eq.nom}${eq.marque ? ' (' + eq.marque + ')' : ''}`;
        document.getElementById('currentEquipService').textContent =
            `${eq.service || ''}${eq.codeInventaire ? ' • ' + eq.codeInventaire : ''}`;
    }

    function clearEquipment() {
        currentEquipment = null;
        lastDiagData = null;
        document.getElementById('equipmentContext').style.display = 'none';
        addMessage('🔄 Équipement désélectionné. Décrivez un nouveau symptôme.', 'bot');
    }

    function nouveauDiagnostic() {
        currentEquipment = null;
        lastDiagData = null;
        conversationId = null;
        document.getElementById('equipmentContext').style.display = 'none';
        addMessage('🆕 Nouveau diagnostic. Décrivez le problème ou scannez un QR code.', 'bot');
    }

    // ─── UTILITAIRES UI ────────────────────────────────────
    function addMessage(text, sender) {
        const container = document.getElementById('chatContainer');
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        const formatted = text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
        div.innerHTML = `<div class="message-content">${formatted}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
        if (document.getElementById('typingIndicator')) return;
        const container = document.getElementById('chatContainer');
        const div = document.createElement('div');
        div.id = 'typingIndicator';
        div.className = 'message bot';
        div.innerHTML = `<div class="message-content">
            <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function hideTyping() {
        document.getElementById('typingIndicator')?.remove();
    }

    function setSendDisabled(disabled) {
        document.getElementById('sendBtn').disabled = disabled;
        document.getElementById('messageInput').disabled = disabled;
    }

    function quickSend(text) {
        document.getElementById('messageInput').value = text;
        sendMessage();
    }

    function openScanner() {
        window.location.href = 'inventaire.html?scan=true';
    }
</script>
</body>
</html>
