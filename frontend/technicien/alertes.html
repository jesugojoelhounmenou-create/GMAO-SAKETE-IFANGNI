<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Alertes - GMAO Sakété</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f5e9;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
            padding: 20px;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .header h1 {
            color: #1b5e20;
            font-size: 24px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            flex: 1;
            min-width: 120px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #1b5e20;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: white;
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .filter-bar select {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 14px;
            background: white;
        }

        .alert-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .alert-card:hover {
            transform: translateX(5px);
        }

        .alert-critical {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .alert-attention {
            border-left-color: #f97316;
            background: #fff7ed;
        }

        .alert-info {
            border-left-color: #3b82f6;
            background: #eff6ff;
        }

        .alert-icon { font-size: 28px; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: bold; margin-bottom: 5px; font-size: 15px; }
        .alert-message { font-size: 13px; color: #64748b; }
        .alert-date { font-size: 11px; color: #94a3b8; margin-top: 5px; }

        .btn-resolve {
            background: #22c55e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-resolve:hover {
            background: #16a34a;
        }

        .resolved-badge {
            background: #dcfce7;
            color: #166534;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 16px;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            body { margin-left: 0; }
            .stats { flex-direction: column; }
            .alert-card { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="header">
        <h1>⚠️ CENTRE D'ALERTES</h1>
    </div>

    <div class="stats" id="statsContainer">
        <div class="stat-card"><div class="stat-number" id="criticalCount">0</div><div class="stat-label">🔴 Critiques</div></div>
        <div class="stat-card"><div class="stat-number" id="attentionCount">0</div><div class="stat-label">🟠 Attention</div></div>
        <div class="stat-card"><div class="stat-number" id="infoCount">0</div><div class="stat-label">🔵 Information</div></div>
    </div>

    <div class="filter-bar">
        <select id="niveauFilter" onchange="loadAlertes()">
            <option value="">📊 Tous niveaux</option>
            <option value="CRITIQUE">🔴 Critiques</option>
            <option value="ATTENTION">🟠 Attention</option>
            <option value="INFO">🔵 Information</option>
        </select>
        <select id="resoluFilter" onchange="loadAlertes()">
            <option value="false">⏳ Non résolues</option>
            <option value="true">✅ Résolues</option>
            <option value="">📋 Toutes</option>
        </select>
    </div>

    <div id="alertesList"><div class="empty-state">Chargement...</div></div>
</div>

<script>
    const API_URL = 'http://192.168.62.215:5500/api';

    function getToken() { return localStorage.getItem('token'); }
    if (!getToken()) window.location.href = '/login.html';

    function loadSidebar() {
        fetch('/components/sidebar.html')
            .then(response => response.text())
            .then(data => document.getElementById('sidebar-container').innerHTML = data)
            .catch(error => console.error('Erreur sidebar:', error));
    }

    async function loadStats() {
        try {
            const res = await fetch(`${API_URL}/alertes/stats`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
            const stats = await res.json();
            document.getElementById('criticalCount').innerText = stats.parNiveau?.find(n => n.niveau === 'CRITIQUE')?._count || 0;
            document.getElementById('attentionCount').innerText = stats.parNiveau?.find(n => n.niveau === 'ATTENTION')?._count || 0;
            document.getElementById('infoCount').innerText = stats.parNiveau?.find(n => n.niveau === 'INFO')?._count || 0;
        } catch (error) { console.error('Erreur stats:', error); }
    }

    async function loadAlertes() {
        const niveau = document.getElementById('niveauFilter').value;
        const resolue = document.getElementById('resoluFilter').value;
        let url = `${API_URL}/alertes?`;
        if (niveau) url += `niveau=${niveau}&`;
        if (resolue !== '') url += `resolue=${resolue}&`;
        
        try {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${getToken()}` } });
            const alertes = await res.json();
            if (alertes.length === 0) {
                document.getElementById('alertesList').innerHTML = '<div class="empty-state">✅ Aucune alerte</div>';
                return;
            }
            document.getElementById('alertesList').innerHTML = alertes.map(a => {
                let icon = '', niveauClass = '';
                if (a.niveau === 'CRITIQUE') { icon = '🔴'; niveauClass = 'alert-critical'; }
                else if (a.niveau === 'ATTENTION') { icon = '🟠'; niveauClass = 'alert-attention'; }
                else { icon = '🔵'; niveauClass = 'alert-info'; }
                return `
                    <div class="alert-card ${niveauClass}">
                        <div class="alert-icon">${icon}</div>
                        <div class="alert-content">
                            <div class="alert-title">${a.type?.replace(/_/g, ' ') || 'Alerte'}</div>
                            <div class="alert-message">${a.message}</div>
                            <div class="alert-date">📅 ${new Date(a.dateCreation).toLocaleString()} ${a.equipement?.nom ? `· 🏥 ${a.equipement.nom}` : ''}</div>
                        </div>
                        ${!a.resolue ? `<button class="btn-resolve" onclick="event.stopPropagation();resoudreAlerte(${a.id})">✅ Marquer résolue</button>` : `<span class="resolved-badge">✓ Résolue</span>`}
                    </div>
                `;
            }).join('');
        } catch (error) { document.getElementById('alertesList').innerHTML = '<div class="empty-state">❌ Erreur</div>'; }
    }

    async function resoudreAlerte(id) {
        const commentaire = prompt("Commentaire :");
        await fetch(`${API_URL}/alertes/${id}/resoudre`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` }, body: JSON.stringify({ commentaire: commentaire || null }) });
        loadStats(); loadAlertes();
    }

    loadSidebar();
    loadStats();
    loadAlertes();
    setInterval(() => { loadStats(); loadAlertes(); }, 30000);
</script>
</body>
</html>
