<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Maintenances - GMAO Sakété</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f5e9;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
            padding: 20px;
        }

        .main-content { max-width: 1400px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 { color: #1b5e20; font-size: 24px; }

        .btn-add {
            background: #1b5e20;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .btn-add:hover { background: #2e7d32; transform: translateY(-2px); }

        .btn-planifier {
            background: #ffd600;
            color: #1b5e20;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .btn-planifier:hover { background: #ffeb3b; transform: translateY(-2px); }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 60px;
            display: inline-flex;
        }

        .tab {
            padding: 10px 24px;
            border: none;
            background: transparent;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }

        .tab.active { background: #1b5e20; color: white; }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: white;
            padding: 16px;
            border-radius: 20px;
        }

        .filter-bar select, .filter-bar input {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 14px;
        }

        .table-container {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; }

        .status-EN_ATTENTE { background: #fef3c7; color: #d97706; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
        .status-EN_COURS { background: #dbeafe; color: #2563eb; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
        .status-TERMINE { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
        .status-PREVU { background: #dbeafe; color: #2563eb; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
        .status-REALISE { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }

        .btn { padding: 6px 16px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn-danger { background: #ef4444; color: white; }

        .empty-state { text-align: center; padding: 40px; color: #94a3b8; }

        @media (max-width: 768px) {
            body { margin-left: 0; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="header">
        <h1>🔧 GESTION DES MAINTENANCES</h1>
        <div>
            <button class="btn-planifier" onclick="window.location.href='preventive-form.html'">📅 Planifier préventive</button>
            <button class="btn-add" onclick="window.location.href='intervention-form.html'">➕ Nouvelle intervention</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('correctif')">🛠️ Correctives (Pannes)</button>
        <button class="tab" onclick="switchTab('preventif')">📅 Préventives (Planifiées)</button>
    </div>

    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher..." onkeyup="loadData()">
        <select id="statutFilter" onchange="loadData()">
            <option value="">📊 Tous statuts</option>
            <option value="EN_ATTENTE">⏳ En attente</option>
            <option value="EN_COURS">🔧 En cours</option>
            <option value="TERMINE">✅ Terminé</option>
        </select>
        <select id="serviceFilter" onchange="loadData()">
            <option value="">🏥 Tous services</option>
            <option value="URGENCES">Urgences</option>
            <option value="RADIOLOGIE">Radiologie</option>
            <option value="BLOC_OPERATOIRE">Bloc</option>
            <option value="PEDIATRIE">Pédiatrie</option>
        </select>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead id="tableHeader"><tr><th>ID</th><th>Équipement</th><th>Service</th><th>Description</th><th>Priorité</th><th>Statut</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="8" class="empty-state">Chargement...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';
    let currentTab = 'correctif';

    function getToken() { return localStorage.getItem('token'); }
    if (!getToken()) window.location.href = '/login.html';

    function loadSidebar() {
        fetch('/components/sidebar.html')
            .then(response => response.text())
            .then(data => document.getElementById('sidebar-container').innerHTML = data)
            .catch(error => console.error('Erreur sidebar:', error));
    }

    async function loadData() {
        const search = document.getElementById('searchInput').value;
        const statut = document.getElementById('statutFilter').value;
        const service = document.getElementById('serviceFilter').value;
        
        let url;
        if (currentTab === 'correctif') {
            url = `${API_URL}/maintenances/correctives?search=${search}&statut=${statut}&service=${service}`;
        } else {
            url = `${API_URL}/preventif?search=${search}&statut=${statut}&service=${service}`;
        }
        
        try {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${getToken()}` } });
            const data = await res.json();
            const items = data.interventions || data;
            
            if (items.length === 0) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="empty-state">📭 Aucune donnée</td></tr>';
                return;
            }
            
            if (currentTab === 'correctif') {
                document.getElementById('tableHeader').innerHTML = '<tr><th>ID</th><th>Équipement</th><th>Service</th><th>Description</th><th>Priorité</th><th>Statut</th><th>Date</th><th>Actions</th></tr>';
                document.getElementById('tableBody').innerHTML = items.map(i => `
                    <tr>
                        <td>#${i.id}</td>
                        <td><strong>${i.equipement?.nom}</strong><br><small>${i.equipement?.codeInventaire}</small></td>
                        <td>${i.equipement?.service || '-'}</td>
                        <td>${(i.signalement?.description || i.diagnostic || '').substring(0, 50)}</td>
                        <td>${i.signalement?.priorite || 'NORMALE'}</td>
                        <td><span class="status-${i.statut}">${i.statut === 'EN_ATTENTE' ? '⏳ Attente' : i.statut === 'EN_COURS' ? '🔧 En cours' : '✅ Terminé'}</span></td>
                        <td>${new Date(i.dateDebut).toLocaleDateString()}</td>
                        <td>
                            ${i.statut === 'EN_ATTENTE' ? `<button class="btn btn-primary" onclick="prendreEnCharge(${i.id})">Prendre</button>` : ''}
                            ${i.statut === 'EN_COURS' ? `<button class="btn btn-success" onclick="terminer(${i.id})">Terminer</button>` : ''}
                            <button class="btn btn-secondary" onclick="voirDetail(${i.id})">Voir</button>
                        </td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('tableHeader').innerHTML = '<tr><th>ID</th><th>Équipement</th><th>Service</th><th>Type</th><th>Périodicité</th><th>Prochaine date</th><th>Statut</th><th>Actions</th></tr>';
                document.getElementById('tableBody').innerHTML = items.map(i => `
                    <tr>
                        <td>#${i.id}</td>
                        <td><strong>${i.equipement?.nom}</strong><br><small>${i.equipement?.codeInventaire}</small></td>
                        <td>${i.equipement?.service || '-'}</td>
                        <td>${i.type}</td>
                        <td>Tous les ${i.periodicite} jours</td>
                        <td><strong>${new Date(i.prochaineRealisation).toLocaleDateString()}</strong></td>
                        <td><span class="status-${i.statut}">${i.statut === 'PREVU' ? '📅 Prévu' : '✅ Réalisé'}</span></td>
                        <td>
                            ${i.statut === 'PREVU' ? `<button class="btn btn-success" onclick="realiserPreventive(${i.id})">Réaliser</button>` : ''}
                            <button class="btn btn-secondary" onclick="voirPreventive(${i.id})">Voir</button>
                        </td>
                    </tr>
                `).join('');
            }
        } catch (error) {
            console.error('Erreur:', error);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="empty-state">❌ Erreur</td></tr>';
        }
    }

    async function prendreEnCharge(id) {
        await fetch(`${API_URL}/maintenances/${id}/prendre`, { method: 'PUT', headers: { 'Authorization': `Bearer ${getToken()}` } });
        loadData();
    }

    function terminer(id) { window.location.href = `intervention-form.html?id=${id}`; }
    function voirDetail(id) { window.location.href = `intervention-form.html?id=${id}`; }
    function voirPreventive(id) { window.location.href = `preventive.html?id=${id}`; }
    function realiserPreventive(id) { window.location.href = `preventive.html?id=${id}`; }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab === 'correctif' && i === 0) || (tab === 'preventif' && i === 1)));
        loadData();
    }

    loadSidebar();
    loadData();
</script>
</body>
</html>
