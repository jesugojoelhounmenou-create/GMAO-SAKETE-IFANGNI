<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rapports CoDIR - GMAO Sakété</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f5e9;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
            padding: 20px;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .header h1 {
            color: #1b5e20;
            font-size: 24px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .controls select, 
        .controls input {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .btn-generate {
            background: #1b5e20;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-generate:hover {
            background: #2e7d32;
            transform: translateY(-2px);
        }

        .btn-export {
            background: #ffd600;
            color: #1b5e20;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-export:hover {
            background: #ffeb3b;
            transform: translateY(-2px);
        }

        .section {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .section h3 {
            color: #1b5e20;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            font-size: 18px;
        }

        .section h4 {
            color: #334155;
            margin: 20px 0 10px 0;
            font-size: 16px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .kpi-card {
            text-align: center;
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            transition: transform 0.2s;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
        }

        .kpi-value {
            font-size: 36px;
            font-weight: bold;
            color: #1b5e20;
        }

        .kpi-label {
            color: #64748b;
            margin-top: 5px;
            font-size: 13px;
        }

        .progress-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            background: #22c55e;
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-fill-blue {
            background: #3b82f6;
        }

        .top-pannes-list {
            list-style: none;
            padding: 0;
        }

        .top-pannes-list li {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .panne-badge {
            background: #fee2e2;
            color: #dc2626;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .alertes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .alerte-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alerte-icon {
            font-size: 24px;
        }

        .alerte-info {
            flex: 1;
        }

        .alerte-title {
            font-weight: bold;
            font-size: 14px;
        }

        .alerte-value {
            font-size: 20px;
            font-weight: bold;
            color: #1b5e20;
        }

        .loader {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            body { margin-left: 0; }
            .kpi-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: stretch; }
            .controls select, .controls input, .controls button { width: 100%; }
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="header">
        <h1>📈 RAPPORTS CoDIR</h1>
    </div>

    <div class="controls">
        <select id="moisSelect">
            <option value="1">Janvier</option><option value="2">Février</option><option value="3">Mars</option>
            <option value="4">Avril</option><option value="5">Mai</option><option value="6">Juin</option>
            <option value="7">Juillet</option><option value="8">Août</option><option value="9">Septembre</option>
            <option value="10">Octobre</option><option value="11">Novembre</option><option value="12">Décembre</option>
        </select>
        <input type="number" id="anneeSelect" value="2026" style="width: 100px;">
        <button class="btn-generate" onclick="loadRapport()">🔄 Générer rapport</button>
        <button class="btn-export" onclick="exportPDF()">📄 Exporter PDF</button>
        <button class="btn-export" onclick="exportExcel()">📊 Exporter Excel</button>
    </div>

    <div id="rapportContent">
        <div class="loader">Chargement du rapport...</div>
    </div>
</div>

<script>
    // ✅ URL API corrigée
    const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';

    function getToken() { return localStorage.getItem('token'); }
    if (!getToken()) window.location.href = '/login.html';

    function loadSidebar() {
        fetch('/components/sidebar.html')
            .then(response => response.text())
            .then(data => document.getElementById('sidebar-container').innerHTML = data)
            .catch(error => console.error('Erreur sidebar:', error));
    }

    async function loadRapport() {
        const mois = document.getElementById('moisSelect').value;
        const annee = document.getElementById('anneeSelect').value;
        document.getElementById('rapportContent').innerHTML = '<div class="loader">📊 Génération du rapport...</div>';
        
        try {
            const res = await fetch(`${API_URL}/codir/indicators?mois=${mois}&annee=${annee}`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            const data = await res.json();
            const i = data.indicateurs;
            
            document.getElementById('rapportContent').innerHTML = `
                <div class="section">
                    <h3>📊 Disponibilité des équipements</h3>
                    <div class="kpi-grid">
                        <div class="kpi-card"><div class="kpi-value">${i.disponibilite?.globale || 0}%</div><div class="kpi-label">Disponibilité globale</div><div class="progress-bar"><div class="progress-fill" style="width: ${i.disponibilite?.globale || 0}%"></div></div><div style="font-size:12px; margin-top:5px;">${i.disponibilite?.globale >= 95 ? '✅ Objectif OMS atteint' : '⚠️ Objectif OMS: 95%'}</div></div>
                        <div class="kpi-card"><div class="kpi-value">${i.fiabilite?.mtbf || '0'} j</div><div class="kpi-label">MTBF (fiabilité)</div><div class="kpi-label" style="font-size:11px">Temps moyen entre pannes</div></div>
                        <div class="kpi-card"><div class="kpi-value">${i.fiabilite?.mttr || '0'} h</div><div class="kpi-label">MTTR (réparabilité)</div><div class="kpi-label" style="font-size:11px">Temps moyen de réparation</div></div>
                        <div class="kpi-card"><div class="kpi-value">${(i.maintenance?.coutTotal || 0).toLocaleString()} FCFA</div><div class="kpi-label">Coût total maintenance</div><div class="kpi-label" style="font-size:11px">Sur la période</div></div>
                    </div>
                    <h4>🏥 Disponibilité par service</h4>
                    ${i.disponibilite?.parService?.map(s => `<div style="margin-bottom: 12px;"><div style="display: flex; justify-content: space-between; margin-bottom: 5px;"><strong>${s.service}</strong><span>${s.disponibilite}%</span></div><div class="progress-bar"><div class="progress-fill progress-fill-blue" style="width: ${s.disponibilite}%"></div></div></div>`).join('') || '<p>Aucune donnée</p>'}
                </div>
                <div class="section"><h3>🔝 Top 5 équipements les plus en panne</h3><ul class="top-pannes-list">${i.topEquipementsPannes?.map((e, idx) => `<li><span><strong>${idx + 1}.</strong> ${e.equipmentNom || e.equipementNom}</span><span class="panne-badge">${e.nombrePannes} panne(s)</span></li>`).join('') || '<li>Aucune donnée disponible</li>'}</ul></div>
                <div class="section"><h3>⚠️ Alertes et recommandations</h3><div class="alertes-grid">
                    <div class="alerte-card"><div class="alerte-icon">⚠️</div><div class="alerte-info"><div class="alerte-title">Stock faible</div><div class="alerte-value">${i.alertes?.stockFaible || 0} références</div><div style="font-size:11px; color:#64748b;">Pièces sous seuil critique</div></div></div>
                    <div class="alerte-card"><div class="alerte-icon">📅</div><div class="alerte-info"><div class="alerte-title">Garanties expirant</div><div class="alerte-value">${i.alertes?.garantiesExpirant || 0} équipements</div><div style="font-size:11px; color:#64748b;">Dans les 30 prochains jours</div></div></div>
                    <div class="alerte-card"><div class="alerte-icon">🔧</div><div class="alerte-info"><div class="alerte-title">Taux préventif</div><div class="alerte-value">${i.maintenance?.tauxPreventif || '0'}%</div><div style="font-size:11px; color:#64748b;">Maintenances réalisées</div></div></div>
                    <div class="alerte-card"><div class="alerte-icon">📊</div><div class="alerte-info"><div class="alerte-title">Pannes critiques</div><div class="alerte-value">${i.fiabilite?.tauxPannesCritiques || '0'}%</div><div style="font-size:11px; color:#64748b;">Impactant les soins</div></div></div>
                </div></div>
                <div class="section"><h3>📋 Résumé exécutif</h3><p style="line-height: 1.6; color: #334155;"><strong>Période :</strong> ${i.periode?.mois}/${i.periode?.annee}<br><br>La disponibilité globale des équipements est de <strong>${i.disponibilite?.globale || 0}%</strong>. ${i.disponibilite?.globale >= 95 ? 'Ce résultat est conforme aux objectifs OMS.' : 'Des efforts sont nécessaires pour atteindre l\'objectif OMS de 95%.'}<br><br>Le MTBF (fiabilité) est de <strong>${i.fiabilite?.mtbf || '0'} jours</strong> et le MTTR (réparabilité) de <strong>${i.fiabilite?.mttr || '0'} heures</strong>.<br><br>Le coût total de maintenance sur la période s'élève à <strong>${(i.maintenance?.coutTotal || 0).toLocaleString()} FCFA</strong>.</p></div>
            `;
        } catch (error) {
            console.error('Erreur:', error);
            document.getElementById('rapportContent').innerHTML = '<div class="loader">❌ Erreur lors du chargement du rapport</div>';
        }
    }

    function exportPDF() { 
        const mois = document.getElementById('moisSelect').value; 
        const annee = document.getElementById('anneeSelect').value; 
        window.open(`${API_URL}/codir/export-pdf?mois=${mois}&annee=${annee}`, '_blank'); 
    }
    
    function exportExcel() { 
        const mois = document.getElementById('moisSelect').value; 
        const annee = document.getElementById('anneeSelect').value; 
        window.location.href = `${API_URL}/codir/export-excel?mois=${mois}&annee=${annee}`; 
    }

    loadSidebar();
    loadRapport();
</script>
</body>
</html>
