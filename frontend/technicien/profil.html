<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mon profil - GMAO Sakété</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f5e9;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
            padding: 20px;
        }

        .main-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #1b5e20;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .avatar {
            text-align: center;
            font-size: 80px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .label {
            width: 120px;
            color: #64748b;
            font-size: 13px;
        }

        .value {
            flex: 1;
            font-weight: 500;
            font-size: 14px;
        }

        .badge-active {
            background: #dcfce7;
            color: #166534;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 11px;
            font-weight: bold;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            background: #f8fafc;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #1b5e20;
        }

        .stat-label {
            font-size: 11px;
            color: #64748b;
            margin-top: 5px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #1b5e20;
            color: white;
        }

        .btn-primary:hover {
            background: #2e7d32;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
        }

        .modal h3 {
            color: #1b5e20;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 13px;
            color: #334155;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
        }

        .message {
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
            font-size: 13px;
        }

        .message-success {
            background: #dcfce7;
            color: #166534;
            border-left: 3px solid #22c55e;
        }

        .message-error {
            background: #fee2e2;
            color: #dc2626;
            border-left: 3px solid #ef4444;
        }

        @media (max-width: 768px) {
            body { margin-left: 0; }
            .label { width: 100%; margin-bottom: 5px; }
            .info-row { flex-direction: column; }
            .stats { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="card">
        <div class="avatar">👨‍🔧</div>
        <div class="title" id="userName">Chargement...</div>
        <div id="message" class="message"></div>
        
        <div class="info-row"><div class="label">Matricule</div><div class="value" id="userMatricule">-</div></div>
        <div class="info-row"><div class="label">Email</div><div class="value" id="userEmail">-</div></div>
        <div class="info-row"><div class="label">Téléphone</div><div class="value" id="userPhone">-</div></div>
        <div class="info-row"><div class="label">Service</div><div class="value" id="userService">-</div></div>
        <div class="info-row"><div class="label">Rôle</div><div class="value">🔧 Technicien</div></div>
        <div class="info-row"><div class="label">Statut</div><div class="value"><span class="badge-active" id="userStatus">✅ Actif</span></div></div>
        <div class="info-row"><div class="label">Membre depuis</div><div class="value" id="userSince">-</div></div>
        <div class="info-row"><div class="label">Dernière connexion</div><div class="value" id="lastLogin">-</div></div>

        <div class="stats" id="statsContainer">
            <div class="stat-card"><div class="stat-number" id="totalInterventions">-</div><div class="stat-label">Interventions</div></div>
            <div class="stat-card"><div class="stat-number" id="tauxSucces">-</div><div class="stat-label">Taux succès</div></div>
            <div class="stat-card"><div class="stat-number" id="satisfaction">-</div><div class="stat-label">Satisfaction</div></div>
        </div>
        
        <button class="btn btn-primary" onclick="openEditModal()">✏️ Modifier</button>
        <button class="btn btn-secondary" onclick="openPasswordModal()">🔑 Mot de passe</button>
        <button class="btn btn-danger" onclick="logout()">🚪 Déconnexion</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ Modifier</h3>
        <div class="form-group"><label>Nom</label><input type="text" id="editNom"></div>
        <div class="form-group"><label>Prénom</label><input type="text" id="editPrenom"></div>
        <div class="form-group"><label>Téléphone</label><input type="tel" id="editTelephone"></div>
        <div class="form-group"><label>Service</label><input type="text" id="editService"></div>
        <button class="btn btn-primary" onclick="saveProfile()">💾 Enregistrer</button>
        <button class="btn btn-secondary" onclick="closeEditModal()">Annuler</button>
    </div>
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h3>🔑 Changer mot de passe</h3>
        <div class="form-group"><label>Mot de passe actuel</label><input type="password" id="currentPassword"></div>
        <div class="form-group"><label>Nouveau mot de passe</label><input type="password" id="newPassword"></div>
        <div class="form-group"><label>Confirmer</label><input type="password" id="confirmPassword"></div>
        <button class="btn btn-primary" onclick="changePassword()">🔑 Changer</button>
        <button class="btn btn-secondary" onclick="closePasswordModal()">Annuler</button>
    </div>
</div>

<script>
    const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';
    const userId = localStorage.getItem('userId');

    function getToken() { return localStorage.getItem('token'); }
    if (!getToken()) window.location.href = '/login.html';

    function loadSidebar() {
        fetch('/components/sidebar.html')
            .then(response => response.text())
            .then(data => document.getElementById('sidebar-container').innerHTML = data)
            .catch(error => console.error('Erreur sidebar:', error));
    }

    async function loadProfile() {
        try {
            const res = await fetch(`${API_URL}/users/${userId}`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
            const user = await res.json();
            document.getElementById('userName').innerText = `${user.nom} ${user.prenom || ''}`;
            document.getElementById('userMatricule').innerText = user.matricule || '-';
            document.getElementById('userEmail').innerText = user.email;
            document.getElementById('userPhone').innerText = user.telephone || '-';
            document.getElementById('userService').innerText = user.service || 'MAINTENANCE';
            document.getElementById('userSince').innerText = new Date(user.createdAt).toLocaleDateString();
            document.getElementById('lastLogin').innerText = user.dernierConnexion ? new Date(user.dernierConnexion).toLocaleString() : 'Jamais';
            await loadStats();
        } catch (error) { console.error('Erreur:', error); }
    }

    async function loadStats() {
        try {
            const res = await fetch(`${API_URL}/maintenances/my/stats`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
            const stats = await res.json();
            document.getElementById('totalInterventions').innerText = stats.total || 0;
            document.getElementById('tauxSucces').innerText = stats.tauxSucces ? `${stats.tauxSucces}%` : '0%';
            document.getElementById('satisfaction').innerText = stats.satisfactionMoyenne ? `${stats.satisfactionMoyenne}/5` : '-';
        } catch (error) { console.error('Erreur stats:', error); }
    }

    function showMessage(msg, type) {
        const d = document.getElementById('message');
        d.className = `message message-${type === 'error' ? 'error' : 'success'}`;
        d.innerHTML = msg;
        d.style.display = 'block';
        setTimeout(() => d.style.display = 'none', 5000);
    }

    function openEditModal() {
        document.getElementById('editNom').value = document.getElementById('userName').innerText.split(' ')[0] || '';
        document.getElementById('editPrenom').value = document.getElementById('userName').innerText.split(' ')[1] || '';
        document.getElementById('editTelephone').value = document.getElementById('userPhone').innerText !== '-' ? document.getElementById('userPhone').innerText : '';
        document.getElementById('editService').value = document.getElementById('userService').innerText;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    async function saveProfile() {
        const data = {
            nom: document.getElementById('editNom').value,
            prenom: document.getElementById('editPrenom').value,
            telephone: document.getElementById('editTelephone').value,
            service: document.getElementById('editService').value
        };
        const res = await fetch(`${API_URL}/users/${userId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` }, body: JSON.stringify(data) });
        if (res.ok) { showMessage('✅ Profil mis à jour', 'success'); closeEditModal(); loadProfile(); localStorage.setItem('userName', data.nom); }
        else showMessage('❌ Erreur', 'error');
    }

    function openPasswordModal() { document.getElementById('passwordModal').style.display = 'flex'; }
    function closePasswordModal() { document.getElementById('passwordModal').style.display = 'none'; }

    async function changePassword() {
        const cp = document.getElementById('currentPassword').value;
        const np = document.getElementById('newPassword').value;
        const cf = document.getElementById('confirmPassword').value;
        if (!cp || !np || !cf) { showMessage('Remplissez tous les champs', 'error'); return; }
        if (np !== cf) { showMessage('Mots de passe différents', 'error'); return; }
        if (np.length < 6) { showMessage('Minimum 6 caractères', 'error'); return; }
        const res = await fetch(`${API_URL}/auth/change-password`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` }, body: JSON.stringify({ currentPassword: cp, newPassword: np }) });
        if (res.ok) { showMessage('✅ Mot de passe modifié', 'success'); closePasswordModal(); }
        else showMessage('❌ Erreur', 'error');
    }

    function logout() { if (confirm('Déconnexion ?')) { localStorage.clear(); window.location.href = '/login.html'; } }

    loadSidebar();
    loadProfile();
</script>
</body>
</html>
