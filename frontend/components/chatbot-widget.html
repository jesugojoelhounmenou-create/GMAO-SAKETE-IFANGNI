<!-- Widget Chatbot flottant -->
<div class="chatbot-container">
    <button class="chatbot-button" onclick="toggleChatbot()">
        🤖
    </button>
    <div class="chatbot-window" id="chatbotWindow" style="display: none;">
        <div class="chatbot-header">
            <div class="chatbot-header-left">
                <div class="avatar">🤖</div>
                <div class="chatbot-header-info">
                    <h4>Assistant Maintenance</h4>
                    <p><span class="status-online"></span> En ligne</p>
                </div>
            </div>
            <button class="chatbot-close" onclick="toggleChatbot()">×</button>
        </div>
        <div class="chatbot-messages" id="chatbotMessages">
            <div class="message message-bot">
                <div class="message-content">
                    👋 Bonjour! Je suis votre assistant.<br>
                    Comment puis-je vous aider ?
                </div>
            </div>
        </div>
        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuickMessage('signaler une panne')">⚠️ Panne</button>
            <button class="quick-btn" onclick="sendQuickMessage('état du respirateur')">🔍 État</button>
            <button class="quick-btn" onclick="sendQuickMessage('guide')">📖 Guide</button>
            <button class="quick-btn" onclick="openScanner()">📱 Scanner QR</button>
        </div>
        <div class="chatbot-input-area">
            <input type="text" class="chatbot-input" id="chatbotInput" placeholder="Écrivez votre message..." onkeypress="if(event.key==='Enter') sendChatbotMessage()">
            <button class="chatbot-send" onclick="sendChatbotMessage()">➤</button>
        </div>
    </div>
</div>

<style>
    .chatbot-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .chatbot-button {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #1a2a4f, #1e3a5f);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
        border: none;
        color: white;
        font-size: 28px;
    }
    .chatbot-button:hover { transform: scale(1.05); }
    .chatbot-window {
        position: fixed;
        bottom: 90px;
        right: 20px;
        width: 380px;
        height: 550px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: slideUp 0.3s ease;
        z-index: 1001;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .chatbot-header {
        background: linear-gradient(135deg, #1a2a4f, #1e3a5f);
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .chatbot-header-left { display: flex; align-items: center; gap: 10px; }
    .chatbot-header-left .avatar {
        width: 40px; height: 40px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
    }
    .chatbot-header-info h4 { font-size: 16px; margin-bottom: 2px; }
    .chatbot-header-info p { font-size: 11px; opacity: 0.8; }
    .status-online {
        display: inline-block;
        width: 8px; height: 8px;
        background: #22c55e;
        border-radius: 50%;
        margin-right: 5px;
        box-shadow: 0 0 5px #22c55e;
    }
    .chatbot-close {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
    }
    .chatbot-messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: #f8fafc;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .message { display: flex; max-width: 85%; }
    .message-user { align-self: flex-end; justify-content: flex-end; }
    .message-bot { align-self: flex-start; }
    .message-content {
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 13px;
        line-height: 1.4;
    }
    .message-user .message-content {
        background: #1a2a4f;
        color: white;
        border-bottom-right-radius: 4px;
    }
    .message-bot .message-content {
        background: white;
        color: #1e293b;
        border-bottom-left-radius: 4px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .quick-actions {
        padding: 10px 15px;
        background: #f8fafc;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        border-top: 1px solid #e2e8f0;
    }
    .quick-btn {
        background: #e2e8f0;
        border: none;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
        transition: 0.2s;
    }
    .quick-btn:hover { background: #3b82f6; color: white; }
    .chatbot-input-area {
        padding: 12px 15px;
        background: white;
        border-top: 1px solid #e2e8f0;
        display: flex;
        gap: 10px;
    }
    .chatbot-input {
        flex: 1;
        padding: 10px 15px;
        border: 1px solid #e2e8f0;
        border-radius: 25px;
        font-size: 13px;
        outline: none;
    }
    .chatbot-input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
    }
    .chatbot-send {
        width: 40px;
        height: 40px;
        background: #1a2a4f;
        border: none;
        border-radius: 50%;
        color: white;
        cursor: pointer;
    }
    @media (max-width: 480px) {
        .chatbot-window { width: calc(100vw - 40px); right: 20px; left: 20px; height: 70vh; bottom: 20px; }
        .chatbot-button { width: 50px; height: 50px; font-size: 24px; }
    }
</style>

<script>
    function toggleChatbot() {
        const window = document.getElementById('chatbotWindow');
        window.style.display = window.style.display === 'none' ? 'flex' : 'none';
    }
    function sendQuickMessage(msg) {
        document.getElementById('chatbotInput').value = msg;
        sendChatbotMessage();
    }
    async function sendChatbotMessage() {
        const input = document.getElementById('chatbotInput');
        const message = input.value.trim();
        if (!message) return;
        addChatbotMessage(message, 'user');
        input.value = '';
        try {
            const res = await fetch('http://localhost:5000/api/chatbot/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            addChatbotMessage(data.reply, 'bot');
        } catch(e) { addChatbotMessage('❌ Erreur, réessayez', 'bot'); }
    }
    function addChatbotMessage(text, sender) {
        const container = document.getElementById('chatbotMessages');
        const div = document.createElement('div');
        div.className = `message message-${sender}`;
        div.innerHTML = `<div class="message-content">${text}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    function openScanner() { window.location.href = '/soignant/scanner.html'; }
</script>
