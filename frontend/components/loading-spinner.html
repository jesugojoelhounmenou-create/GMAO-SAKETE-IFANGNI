<!-- Spinner de chargement -->
<div id="loadingSpinner" class="loading-spinner" style="display: none;">
    <div class="spinner-overlay">
        <div class="spinner-container">
            <div class="spinner"></div>
            <p class="spinner-text">Chargement en cours...</p>
        </div>
    </div>
</div>

<style>
    .loading-spinner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
    }
    .spinner-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .spinner-container {
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #e2e8f0;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 15px;
    }
    .spinner-text {
        color: #64748b;
        font-size: 14px;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>

<script>
    function showSpinner(text = 'Chargement en cours...') {
        document.querySelector('.spinner-text').innerText = text;
        document.getElementById('loadingSpinner').style.display = 'block';
    }
    function hideSpinner() {
        document.getElementById('loadingSpinner').style.display = 'none';
    }
</script>
