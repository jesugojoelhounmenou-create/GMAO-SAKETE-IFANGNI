<style>
    .sidebar {
        position: fixed;
        top: 0; left: 0;
        width: 280px;
        height: 100vh;
        background: #1b5e20;
        color: white;
        display: flex;
        flex-direction: column;
        z-index: 1000;
        box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.2) transparent;
    }

    .sidebar-header {
        padding: 22px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.15);
        background: #2e7d32;
        flex-shrink: 0;
    }
    .sidebar-logo { font-size: 20px; font-weight: bold; }
    .sidebar-logo span { color: #ffd600; }
    .sidebar-subtitle { font-size: 11px; opacity: 0.6; margin-top: 4px; }

    .sidebar-menu { 
        flex: 1; 
        padding: 8px 0 20px;
        overflow-y: auto;
    }

    .sidebar-section {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(255,255,255,0.35);
        padding: 14px 20px 4px;
    }

    .sidebar-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 20px;
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        transition: all 0.2s;
        border-left: 3px solid transparent;
        font-size: 14px;
    }
    .sidebar-item:hover {
        background: rgba(255,255,255,0.1);
        color: white;
        border-left-color: #ffd600;
    }
    .sidebar-item.active {
        background: rgba(255,255,255,0.15);
        color: white;
        border-left-color: #ffd600;
        font-weight: 600;
    }

    .sidebar-item.sidebar-sub {
        padding-left: 36px;
        font-size: 13px;
        opacity: 0.85;
    }
    .sidebar-item.sidebar-sub::before {
        content: '└';
        color: rgba(255,255,255,0.3);
        font-size: 12px;
        margin-right: -4px;
    }

    .sidebar-icon { width: 22px; text-align: center; font-size: 17px; flex-shrink: 0; }
    .sidebar-text { font-size: 14px; font-weight: 500; }

    .sidebar-footer {
        padding: 16px 20px;
        border-top: 1px solid rgba(255,255,255,0.15);
        margin-top: auto;
    }

    .sidebar-logout-btn {
        width: 100%;
        background: #ef4444;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 30px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .sidebar-logout-btn:hover {
        background: #dc2626;
        transform: translateY(-1px);
    }

    @media (max-width: 768px) {
        .sidebar {
            transform: translateX(-100%);
            width: 260px;
            transition: transform 0.3s ease;
        }
        .sidebar.open { transform: translateX(0); }
    }
</style>

<script>
    (function() {
        const page = window.location.pathname.split('/').pop() || 'dashboard.html';
        document.querySelectorAll('.sidebar-item').forEach(item => {
            const href = item.getAttribute('href') || '';
            if (href === page || (page === '' && href === 'dashboard.html')) {
                item.classList.add('active');
            }
        });
    })();

    window.logout = function() {
        if (confirm('Voulez-vous vraiment vous deconnecter ?')) {
            localStorage.clear();
            window.location.replace('/login.html');
        }
    };

    window.toggleMobileMenu = function() {
        const sidebar = document.getElementById('sidebar');
        if (sidebar) {
            sidebar.classList.toggle('open');
        }
    };
</script>
