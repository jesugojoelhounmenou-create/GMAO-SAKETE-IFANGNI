<script>
    const Navbar = {
        init: function() {
            this.updateUserInfo();
            this.setActiveLink();
            this.initMobileCloseOnClick();
        },
        
        updateUserInfo: function() {
            const userName = localStorage.getItem('userName') || 'Utilisateur';
            const userRole = localStorage.getItem('userRole');
            const userAvatar = this.getUserAvatar(userName);
            
            document.getElementById('navUserName').innerText = userName;
            document.getElementById('userAvatar').innerText = userAvatar;
            
            if (userRole) {
                const roleText = userRole === 'TECHNICIEN' ? 'Technicien' : 'Soignant';
                const roleSpan = document.getElementById('navUserRole');
                if (roleSpan) roleSpan.innerText = roleText;
            }
        },
        
        getUserAvatar: function(name) {
            if (!name) return 'U';
            return name.charAt(0).toUpperCase();
        },
        
        setActiveLink: function() {
            const currentPath = window.location.pathname;
            const links = document.querySelectorAll('.nav-link');
            
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && currentPath.includes(href) && href !== '/index.html') {
                    link.classList.add('active');
                } else if (currentPath === '/' || currentPath === '/index.html') {
                    if (link.getAttribute('href') === '/index.html') {
                        link.classList.add('active');
                    }
                }
            });
        },
        
        initMobileCloseOnClick: function() {
            const links = document.querySelectorAll('.nav-link');
            links.forEach(link => {
                link.addEventListener('click', () => {
                    this.closeMobileMenu();
                });
            });
        },
        
        closeMobileMenu: function() {
            const menu = document.getElementById('navMenu');
            if (menu.classList.contains('open')) {
                menu.classList.remove('open');
            }
        },
        
        showLoading: function() {
            const bar = document.getElementById('navLoadingBar');
            if (bar) bar.style.display = 'block';
        },
        
        hideLoading: function() {
            const bar = document.getElementById('navLoadingBar');
            if (bar) bar.style.display = 'none';
        },
        
        setUserName: function(name) {
            localStorage.setItem('userName', name);
            this.updateUserInfo();
        }
    };
    
    function toggleMobileMenu() {
        const menu = document.getElementById('navMenu');
        menu.classList.toggle('open');
    }
    
    function handleLogout() {
        if (confirm('Voulez-vous vraiment vous deconnecter ?')) {
            if (Navbar) Navbar.showLoading();
            localStorage.clear();
            setTimeout(() => {
                window.location.href = '/login.html';
            }, 100);
        }
    }
    
    function logout() {
        handleLogout();
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        Navbar.init();
    });
    
    window.Navbar = Navbar;
    
    window.addEventListener('popstate', () => {
        Navbar.setActiveLink();
        Navbar.closeMobileMenu();
    });
</script>

<script>
    function updateNavbarUserName(newName) {
        if (window.Navbar) {
            Navbar.setUserName(newName);
        }
    }
    
    document.addEventListener('click', (e) => {
        const link = e.target.closest('.nav-link');
        if (link && link.getAttribute('href') && !link.getAttribute('href').startsWith('#')) {
            if (window.Navbar) Navbar.showLoading();
        }
    });
    
    window.addEventListener('load', () => {
        if (window.Navbar) setTimeout(() => Navbar.hideLoading(), 500);
    });
</script>
