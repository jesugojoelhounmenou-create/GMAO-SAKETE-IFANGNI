<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Signaler une panne - GMAO Sakété</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #1a2a4f; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: #334155; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; }
        .btn-primary { background: #ef4444; color: white; border: none; padding: 14px; border-radius: 40px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-secondary { background: #e2e8f0; color: #475569; border: none; padding: 12px; border-radius: 40px; width: 100%; cursor: pointer; margin-top: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #3b82f6; text-decoration: none; }
        .success-message { background: #dcfce7; color: #166534; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .scan-row { display: flex; gap: 10px; align-items: center; }
        .scan-btn { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; white-space: nowrap; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Retour</a>
    <div class="card">
        <div class="title">⚠️ Signaler une panne</div>
        <div id="successMsg" class="success-message">✅ Panne signalée avec succès ! Un technicien va prendre en charge l'intervention.</div>
        
        <div class="form-group">
            <label>Équipement</label>
            <div class="scan-row">
                <select id="equipementId" style="flex:1;">
                    <option value="">Sélectionner un équipement</option>
                </select>
                <button class="scan-btn" onclick="openScanner()">📷 Scanner QR</button>
            </div>
        </div>
        
        <div class="form-group">
            <label>Priorité</label>
            <select id="priorite">
                <option value="CRITIQUE">🚨 Critique - Intervention immédiate</option>
                <option value="HAUTE">⚠️ Haute - Intervention rapide</option>
                <option value="MOYENNE" selected>🟡 Moyenne - Dans la journée</option>
                <option value="BASSE">🔵 Basse - 72h</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Description du problème</label>
            <textarea id="description" rows="4" placeholder="Décrivez précisément le problème..."></textarea>
        </div>
        
        <button class="btn-primary" onclick="signalerPanne()">📢 SIGNALER LA PANNE</button>
        <button class="btn-secondary" onclick="window.location.href='index.html'">Annuler</button>
    </div>
</div>

<script>
    function getToken() { return localStorage.getItem('token'); }

    async function loadEquipements() {
        const res = await fetch('/api/equipements', { headers: { 'Authorization': `Bearer ${getToken()}` } });
        const equipements = await res.json();
        const select = document.getElementById('equipementId');
        select.innerHTML = '<option value="">Sélectionner un équipement</option>' + 
            equipements.map(e => `<option value="${e.id}">${e.nom} (${e.codeInventaire}) - ${e.service}</option>`).join('');
        
        const urlParams = new URLSearchParams(window.location.search);
        const equipId = urlParams.get('equipementId');
        if(equipId) select.value = equipId;
    }

    async function signalerPanne() {
        const equipementId = document.getElementById('equipementId').value;
        const priorite = document.getElementById('priorite').value;
        const description = document.getElementById('description').value;
        
        if(!equipementId) { alert('Veuillez sélectionner un équipement'); return; }
        if(!description) { alert('Veuillez décrire le problème'); return; }
        
        const res = await fetch('/api/maintenances/signaler', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
            body: JSON.stringify({ equipementId: parseInt(equipementId), description, priorite })
        });
        
        if(res.ok) {
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('equipementId').value = '';
            document.getElementById('description').value = '';
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
        } else { alert('Erreur lors du signalement'); }
    }

    function openScanner() { window.location.href = 'scanner.html?return=signaler-panne'; }

    if(!getToken()) window.location.href = '/login.html';
    loadEquipements();
</script>
</body>
</html>
