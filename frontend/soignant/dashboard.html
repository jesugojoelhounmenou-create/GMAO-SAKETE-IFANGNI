<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard Soignant - GMAO Sakété</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        h1 { color: #1a2a4f; font-size: 22px; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        
        .quick-actions { display: flex; gap: 12px; margin-bottom: 20px; }
        .quick-btn { flex: 1; background: #1a2a4f; color: white; border: none; padding: 14px; border-radius: 16px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card-title { font-weight: bold; margin-bottom: 15px; font-size: 16px; display: flex; justify-content: space-between; }
        
        .chatbot { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .chatbot-header { background: #1a2a4f; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .chatbot-messages { height: 300px; overflow-y: auto; padding: 15px; background: #f8fafc; }
        .message { margin-bottom: 12px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .message-content { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; }
        .message.user .message-content { background: #1a2a4f; color: white; }
        .message.bot .message-content { background: #e2e8f0; color: #333; }
        .chatbot-input { display: flex; padding: 15px; border-top: 1px solid #e2e8f0; }
        .chatbot-input input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 30px; outline: none; }
        .chatbot-input button { background: #1a2a4f; color: white; border: none; width: 45px; border-radius: 30px; margin-left: 10px; cursor: pointer; }
        .quick-chat { display: flex; gap: 8px; padding: 10px 15px; flex-wrap: wrap; background: #f8fafc; }
        .quick-chat-btn { background: #e2e8f0; border: none; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        
        .report-item { padding: 12px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .status-resolved { color: #22c55e; font-size: 12px; }
        .status-pending { color: #f97316; font-size: 12px; }
        .back-link { display: inline-block; margin-bottom: 15px; color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Retour</a>
    <div class="header">
        <h1>🏥 Tableau de bord</h1>
        <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
    <p>Bienvenue, <strong id="userName"></strong> - Service <strong id="userService"></strong></p>

    <div class="quick-actions">
        <button class="quick-btn" onclick="window.location.href='scanner.html'">📱 Scanner QR</button>
        <button class="quick-btn" onclick="window.location.href='signaler-panne.html'">⚠️ Signaler une panne</button>
    </div>

    <div class="chatbot">
        <div class="chatbot-header">
            <span>🤖 Assistant Maintenance</span>
            <span>🟢 En ligne</span>
        </div>
        <div class="chatbot-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">👋 Bonjour! Je suis votre assistant. Signalez une panne, vérifiez l'état d'un équipement ou scannez un QR code.</div>
            </div>
        </div>
        <div class="quick-chat">
            <button class="quick-chat-btn" onclick="sendQuickMessage('signaler une panne')">⚠️ Signaler panne</button>
            <button class="quick-chat-btn" onclick="sendQuickMessage('état du respirateur')">🔍 État équipement</button>
            <button class="quick-chat-btn" onclick="sendQuickMessage('comment utiliser')">📖 Guide</button>
            <button class="quick-chat-btn" onclick="window.location.href='scanner.html'">📱 Scanner QR</button>
        </div>
        <div class="chatbot-input">
            <input type="text" id="chatInput" placeholder="Écrivez votre message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📋 Mes derniers signalements</div>
        <div id="reportsList">Chargement...</div>
    </div>
</div>

<script>
    let conversationId = null;

    function getToken() { return localStorage.getItem('token'); }

    function logout() { localStorage.clear(); window.location.href = '/login.html'; }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if(!message) return;
        addMessage(message, 'user');
        input.value = '';
        
        try {
            const res = await fetch('/api/chatbot/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                body: JSON.stringify({ message, conversationId })
            });
            const data = await res.json();
            addMessage(data.reply, 'bot');
            conversationId = data.conversationId;
            if(data.action === 'ask_panne_details') {
                setTimeout(() => { document.getElementById('chatInput').placeholder = "Décrivez le problème..."; }, 500);
            }
            if(data.action === 'open_scanner') {
                setTimeout(() => { window.location.href = 'scanner.html'; }, 1000);
            }
        } catch(e) { addMessage('❌ Erreur, réessayez', 'bot'); }
    }

    function addMessage(text, sender) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = `<div class="message-content">${text}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function sendQuickMessage(msg) { document.getElementById('chatInput').value = msg; sendMessage(); }

    async function loadReports() {
        const res = await fetch('/api/soignant/mes-signalements', { headers: { 'Authorization': `Bearer ${getToken()}` } });
        const reports = await res.json();
        document.getElementById('reportsList').innerHTML = reports.map(r => `
            <div class="report-item">
                <div><strong>${r.equipement?.nom}</strong><br><small>${new Date(r.dateSignalement).toLocaleDateString()}</small></div>
                <div class="${r.traite ? 'status-resolved' : 'status-pending'}">${r.traite ? '✅ Résolu' : '🔄 En cours'}</div>
            </div>
        `).join('') || '<div style="text-align:center; padding:20px;">Aucun signalement</div>';
    }

    document.getElementById('userName').innerText = localStorage.getItem('userName') || 'Soignant';
    document.getElementById('userService').innerText = localStorage.getItem('userService') || 'Urgences';
    if(!getToken()) window.location.href = '/login.html';
    loadReports();
</script>
</body>
</html>
