<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Scanner QR - GMAO Sakété</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; min-height: 100vh; }
        .header { background: #1a2a4f; color: white; padding: 16px; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .title { flex: 1; font-size: 18px; font-weight: bold; }
        .video-container { position: relative; width: 100%; height: 70vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info { background: rgba(0,0,0,0.7); color: white; padding: 16px; text-align: center; position: absolute; bottom: 0; left: 0; right: 0; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 24px; max-width: 350px; width: 90%; padding: 20px; }
        .btn-primary { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-warning { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-secondary { background: #e2e8f0; color: #475569; border: none; padding: 10px; border-radius: 12px; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <div class="title">📷 Scanner un QR code</div>
    </div>
    <div class="video-container">
        <video id="scannerVideo" autoplay playsinline></video>
        <div class="info">Positionnez le QR code dans le cadre</div>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
<script>
    let codeReader = null;
    let scannerActive = false;
    const returnTo = new URLSearchParams(window.location.search).get('return');

    function getToken() { return localStorage.getItem('token'); }

    async function initScanner() {
        codeReader = new ZXing.BrowserMultiFormatReader();
        const videoElement = document.getElementById('scannerVideo');
        
        try {
            const devices = await codeReader.listVideoInputDevices();
            const cameraId = devices[0]?.deviceId;
            if(cameraId) {
                await codeReader.decodeFromVideoDevice(cameraId, videoElement, (result, err) => {
                    if(result && !scannerActive) {
                        scannerActive = true;
                        handleQRResult(result.text);
                    }
                });
            }
        } catch(error) {
            alert("Impossible d'accéder à la caméra");
            window.location.href = 'index.html';
        }
    }

    async function handleQRResult(qrData) {
    try {
        // Essayer de parser le JSON
        let data;
        try {
            data = JSON.parse(qrData);
        } catch(e) {
            data = { code: qrData };
        }
        
        // Si l'URL est présente, rediriger directement
        if (data.url) {
            window.location.href = data.url;
            return;
        }
        
        // Sinon, charger via l'API
        const response = await fetch('https://gmao-sakete-ifangni-1.onrender.com/api/equipements/scan-qr', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
            body: JSON.stringify({ qrData })
        });
        const equipment = await response.json();
        
        // Rediriger vers la fiche technique
        window.location.href = `/technicien/equipement-detail.html?id=${equipment.id}`;
    } catch(error) {
        alert('QR code non reconnu');
    }
}

    function showEquipmentModal(equipment) {
        const modal = document.getElementById('resultModal');
        const modalContent = document.getElementById('modalContent');
        modalContent.innerHTML = `
            <div style="text-align:center; font-size:50px;">📱</div>
            <h3 style="text-align:center; margin:10px 0;">${equipment.nom}</h3>
            <div style="background:#f1f5f9; padding:12px; border-radius:12px; margin:10px 0;">
                <div>📦 Code: ${equipment.codeInventaire}</div>
                <div>🏷️ ${equipment.marque} ${equipment.modele || ''}</div>
                <div>📍 Service: ${equipment.service}</div>
                <div>🟢 Statut: ${equipment.statut === 'FONCTIONNEL' ? '✅ Fonctionnel' : equipment.statut === 'EN_PANNE' ? '❌ En panne' : '🔧 En maintenance'}</div>
                <div>📅 Dernière maintenance: ${equipment.derniereMaintenance ? new Date(equipment.derniereMaintenance).toLocaleDateString() : 'Non effectuée'}</div>
            </div>
            <button class="btn-primary" onclick="signalerPanne(${equipment.id})">⚠️ Signaler une panne</button>
            <button class="btn-secondary" onclick="closeModal()">Fermer</button>
        `;
        modal.style.display = 'flex';
    }

    function signalerPanne(id) {
        window.location.href = `signaler-panne.html?equipementId=${id}`;
    }

    function closeModal() {
        document.getElementById('resultModal').style.display = 'none';
        scannerActive = false;
        initScanner();
    }

    if(!getToken()) window.location.href = '/login.html';
    initScanner();
</script>
</body>
</html>
