<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mon profil - GMAO Sakété</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #1a2a4f; text-align: center; }
        .avatar { text-align: center; font-size: 70px; margin-bottom: 15px; }
        .info-row { display: flex; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; }
        .label { width: 100px; color: #64748b; font-size: 14px; }
        .value { flex: 1; font-weight: 500; }
        .btn-primary { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 40px; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-danger { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 40px; width: 100%; cursor: pointer; margin-top: 10px; }
        .back-link { display: inline-block; margin-bottom: 15px; color: #3b82f6; text-decoration: none; }
        .stats { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .stat-card { flex: 1; background: #f1f5f9; padding: 12px; border-radius: 16px; text-align: center; }
        .stat-number { font-size: 24px; font-weight: bold; color: #1a2a4f; }
        .stat-label { font-size: 11px; color: #64748b; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Retour</a>
    <div class="card">
        <div class="avatar">👨‍⚕️</div>
        <div class="title" id="userName">Chargement...</div>
        
        <div class="info-row"><div class="label">Matricule</div><div class="value" id="userMatricule">-</div></div>
        <div class="info-row"><div class="label">Email</div><div class="value" id="userEmail">-</div></div>
        <div class="info-row"><div class="label">Téléphone</div><div class="value" id="userPhone">-</div></div>
        <div class="info-row"><div class="label">Service</div><div class="value" id="userService">-</div></div>
        <div class="info-row"><div class="label">Membre depuis</div><div class="value" id="userSince">-</div></div>
        
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="totalReports">0</div><div class="stat-label">Signalements</div></div>
            <div class="stat-card"><div class="stat-number" id="resolvedReports">0</div><div class="stat-label">Résolus</div></div>
            <div class="stat-card"><div class="stat-number" id="pendingReports">0</div><div class="stat-label">En cours</div></div>
        </div>
        
        <button class="btn-primary" onclick="editProfile()">✏️ Modifier mon profil</button>
        <button class="btn-danger" onclick="changePassword()">🔑 Changer mot de passe</button>
    </div>
</div>

<script>
    function getToken() { return localStorage.getItem('token'); }

    async function loadProfil() {
        const res = await fetch('/api/soignant/profil', { headers: { 'Authorization': `Bearer ${getToken()}` } });
        const data = await res.json();
        const user = data.user;
        
        document.getElementById('userName').innerText = `${user.nom} ${user.prenom || ''}`;
        document.getElementById('userMatricule').innerText = user.matricule;
        document.getElementById('userEmail').innerText = user.email;
        document.getElementById('userPhone').innerText = user.telephone || 'Non renseigné';
        document.getElementById('userService').innerText = user.service || '-';
        document.getElementById('userSince').innerText = new Date(user.createdAt).toLocaleDateString();
        document.getElementById('totalReports').innerText = data.stats.total;
        document.getElementById('resolvedReports').innerText = data.stats.resolus;
        document.getElementById('pendingReports').innerText = data.stats.enCours;
    }

    function editProfile() { alert('Modification profil (démo)'); }
    function changePassword() { alert('Changement mot de passe (démo)'); }

    if(!getToken()) window.location.href = '/login.html';
    loadProfil();
</script>
</body>
</html>
