<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GMAO Mobile - Dashboard Technicien</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #e8f5e9; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #1a2a4f, #1e3a5f); color: white; padding: 20px; text-align: center; }
        .header h2 { font-size: 20px; margin-bottom: 5px; }
        .user-name { font-size: 14px; opacity: 0.9; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .stat-card { background: white; border-radius: 20px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-value { font-size: 28px; font-weight: bold; color: #1a2a4f; }
        .stat-label { font-size: 11px; color: #666; margin-top: 5px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .menu-item { background: white; border-radius: 16px; padding: 14px 8px; text-align: center; text-decoration: none; color: #1e293b; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .menu-item:active { transform: scale(0.96); background: #f0fdf4; }
        .menu-icon { font-size: 28px; margin-bottom: 6px; }
        .menu-title { font-size: 11px; font-weight: 500; }
        .section { background: white; border-radius: 20px; margin: 15px; padding: 15px; }
        .section-title { font-weight: bold; margin-bottom: 12px; color: #1a2a4f; display: flex; justify-content: space-between; align-items: center; }
        .alert-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; gap: 12px; cursor: pointer; }
        .priority-critical { width: 10px; height: 10px; background: #dc2626; border-radius: 50%; }
        .btn-sm { background: #1b5e20; color: white; border: none; padding: 5px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 30px; width: calc(100% - 30px); margin: 10px 15px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 15px; border-top: 1px solid #e2e8f0; }
        .nav-item { text-align: center; text-decoration: none; color: #94a3b8; font-size: 11px; }
        .nav-item.active { color: #1a2a4f; font-weight: 600; }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🏥 GMAO Mobile</h2>
        <div class="user-name" id="userName">Chargement...</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="equipCount">-</div><div class="stat-label">Équipements</div></div>
        <div class="stat-card"><div class="stat-value" id="interCount">-</div><div class="stat-label">Interventions</div></div>
        <div class="stat-card"><div class="stat-value" id="alertCount">-</div><div class="stat-label">Alertes</div></div>
        <div class="stat-card"><div class="stat-value" id="stockCount">-</div><div class="stat-label">Pièces</div></div>
    </div>

    <div class="menu-grid">
        <a href="dashboard-mobile.html" class="menu-item"><div class="menu-icon">📊</div><div class="menu-title">Dashboard</div></a>
        <a href="/technicien/inventaire.html" class="menu-item"><div class="menu-icon">📦</div><div class="menu-title">Inventaire</div></a>
        <a href="/technicien/maintenances.html" class="menu-item"><div class="menu-icon">🔧</div><div class="menu-title">Maintenances</div></a>
        <a href="/technicien/stock.html" class="menu-item"><div class="menu-icon">⚙️</div><div class="menu-title">Stock</div></a>
        <a href="/technicien/gestion-techniciens.html" class="menu-item"><div class="menu-icon">👥</div><div class="menu-title">Techniciens</div></a>
        <a href="/technicien/planning-garde.html" class="menu-item"><div class="menu-icon">📅</div><div class="menu-title">Planning</div></a>
        <a href="/technicien/codir-rapports.html" class="menu-item"><div class="menu-icon">📈</div><div class="menu-title">CoDIR</div></a>
        <a href="/technicien/fournisseurs.html" class="menu-item"><div class="menu-icon">🏭</div><div class="menu-title">Fournisseurs</div></a>
        <a href="/technicien/utilisateurs.html" class="menu-item"><div class="menu-icon">👥</div><div class="menu-title">Utilisateurs</div></a>
        <a href="/technicien/alertes.html" class="menu-item"><div class="menu-icon">⚠️</div><div class="menu-title">Alertes</div></a>
        <a href="/technicien/documents.html" class="menu-item"><div class="menu-icon">📚</div><div class="menu-title">Documents</div></a>
        <a href="/technicien/profil.html" class="menu-item"><div class="menu-icon">👤</div><div class="menu-title">Profil</div></a>
        <a href="scanner-mobile.html" class="menu-item"><div class="menu-icon">📷</div><div class="menu-title">Scanner</div></a>
        <a href="diagnostic-mobile.html" class="menu-item"><div class="menu-icon">🤖</div><div class="menu-title">Diagnostic</div></a>
        <a href="interventions-mobile.html" class="menu-item"><div class="menu-icon">🔧</div><div class="menu-title">Mes travaux</div></a>
    </div>

    <div class="section">
        <div class="section-title">
            <span>🚨 Alertes récentes</span>
            <button class="btn-sm" onclick="location.href='/technicien/alertes.html'">Voir tout</button>
        </div>
        <div id="alertesList">Chargement...</div>
    </div>

    <button class="logout-btn" onclick="logout()">🚪 Se déconnecter</button>

    
    <script>
        const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';
        function getToken() { return localStorage.getItem('token'); }
        
        if (!getToken()) window.location.href = '/login.html';
        if (localStorage.getItem('userRole') !== 'TECHNICIEN') window.location.href = '/soignant/index.html';
        
        async function chargerStats() {
            try {
                const [equipRes, interRes, alerteRes] = await Promise.all([
                    fetch(`${API_URL}/equipements`, { headers: { 'Authorization': `Bearer ${getToken()}` } }),
                    fetch(`${API_URL}/maintenances`, { headers: { 'Authorization': `Bearer ${getToken()}` } }),
                    fetch(`${API_URL}/alertes`, { headers: { 'Authorization': `Bearer ${getToken()}` } })
                ]);
                const equipements = await equipRes.json();
                const interventions = await interRes.json();
                const alertes = await alerteRes.json();
                document.getElementById('equipCount').innerText = equipements.length || 0;
                document.getElementById('interCount').innerText = interventions.length || 0;
                document.getElementById('alertCount').innerText = alertes.length || 0;
                document.getElementById('stockCount').innerText = '0';
                document.getElementById('userName').innerText = localStorage.getItem('userName') || 'Technicien';
            } catch(e) { console.error(e); }
        }
        
        async function chargerAlertes() {
            try {
                const res = await fetch(`${API_URL}/alertes`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const alertes = await res.json();
                const container = document.getElementById('alertesList');
                if (alertes.length > 0) {
                    container.innerHTML = alertes.slice(0, 3).map(a => `
                        <div class="alert-item" onclick="location.href='/technicien/alertes.html'">
                            <div class="priority-critical"></div>
                            <div><strong>${a.message || 'Alerte'}</strong><br><small>${new Date(a.dateCreation).toLocaleString()}</small></div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div style="text-align:center; padding:20px;">Aucune alerte</div>';
                }
            } catch(e) { console.error(e); }
        }
        
        function logout() { localStorage.clear(); window.location.href = '/login.html'; }
        
        chargerStats();
        chargerAlertes();
    </script>
</body>
</html>
