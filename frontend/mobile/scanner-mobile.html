<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Scanner QR - GMAO Mobile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; min-height: 100vh; }
        .header { background: #1a2a4f; color: white; padding: 20px; text-align: center; }
        .video-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; overflow: hidden; border-radius: 20px; }
        video { width: 100%; border-radius: 20px; }
        .scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 80%; border: 2px solid #22c55e; border-radius: 20px; box-shadow: 0 0 0 4000px rgba(0,0,0,0.5); pointer-events: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { border-color: #22c55e; } 50% { border-color: #3b82f6; } }
        .result { background: white; margin: 20px; padding: 20px; border-radius: 20px; }
        .btn-scan { background: #22c55e; color: white; border: none; padding: 15px; border-radius: 50px; width: calc(100% - 40px); margin: 10px auto; display: block; font-size: 18px; font-weight: 600; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 20px; border-top: 1px solid #eee; }
        .nav-item { text-align: center; text-decoration: none; color: #94a3b8; font-size: 12px; }
        .nav-item.active { color: #1a2a4f; font-weight: 600; }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header"><h2>📷 Scanner QR Code</h2><p>Scannez l'équipement</p></div>
    <div class="video-container"><video id="preview" playsinline autoplay style="width:100%"></video><div class="scan-overlay"></div></div>
    <button class="btn-scan" onclick="startScan()">🔍 Démarrer le scan</button>
    <div id="result" class="result"><h3>Résultat :</h3><p id="scanResult">En attente de scan...</p></div>
    <div class="bottom-nav">
        <a href="dashboard-mobile.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="interventions-mobile.html" class="nav-item"><span class="nav-icon">🔧</span>Travaux</a>
        <a href="scanner-mobile.html" class="nav-item active"><span class="nav-icon">📷</span>Scan</a>
        <a href="profil-mobile.html" class="nav-item"><span class="nav-icon">👤</span>Profil</a>
    </div>
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <script>
        let html5QrCode;
        async function startScan() {
            if(html5QrCode) { html5QrCode.stop(); }
            html5QrCode = new Html5Qrcode("preview");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess, onScanError);
            } catch(e) { alert("Erreur caméra: " + e); }
        }
        async function onScanSuccess(decodedText) {
            await html5QrCode.stop();
            document.getElementById('scanResult').innerHTML = `✅ Équipement trouvé !<br>Code: ${decodedText}<br><br><a href="/technicien/equipement-detail.html?id=${decodedText}" style="background:#1a2a4f; color:white; padding:12px; display:inline-block; border-radius:50px; text-decoration:none;">🔍 Voir l'équipement</a>`;
            try {
                const res = await fetch(`${API_URL}/mobile/scan-qr`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ qrData: decodedText })
                });
                const equip = await res.json();
                if(equip.id) document.getElementById('scanResult').innerHTML = `✅ ${equip.nom}<br>📦 ${equip.codeInventaire}<br><br><a href="/technicien/equipement-detail.html?id=${equip.id}" style="background:#1a2a4f; color:white; padding:12px; display:inline-block; border-radius:50px; text-decoration:none;">🔍 Voir détails</a>`;
            } catch(e) { console.log(e); }
        }
        function onScanError(err) { console.log(err); }
        if(!localStorage.getItem('token')) window.location.href = '/login.html';
        const API_URL = 'https://gmao-sakete-ifangni-1.onrender.com/api';
    </script>
</body>
</html>
