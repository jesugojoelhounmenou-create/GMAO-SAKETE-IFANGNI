<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Intervention - GMAO Mobile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; padding: 16px; padding-bottom: 80px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #1a2a4f; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
        .label { color: #64748b; font-size: 14px; }
        .value { font-weight: 500; }
        .priority { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .priority-CRITIQUE { background: #fee2e2; color: #dc2626; }
        .priority-HAUTE { background: #ffedd5; color: #f97316; }
        .priority-MOYENNE { background: #fef3c7; color: #eab308; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 50px; font-size: 16px; font-weight: 600; margin-top: 10px; cursor: pointer; transition: transform 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 16px; font-size: 14px; margin-top: 8px; font-family: inherit; resize: vertical; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 16px; margin-top: 8px; }
        .back-link { text-align: center; margin-top: 20px; color: #3b82f6; text-decoration: none; display: block; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 12px; height: 100px; margin-bottom: 16px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
<div class="container">
    <div id="content"><div class="skeleton"></div><div class="skeleton"></div></div>
    <a href="javascript:history.back()" class="back-link">← Retour</a>
</div>
<script>
    const id = new URLSearchParams(location.search).get('id');
    const token = localStorage.getItem('token');
    let intervention = null;
    
    async function load() {
        const response = await fetch(`${API_URL}/mobile/interventions/${id}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        intervention = await response.json();
        
        document.getElementById('content').innerHTML = `
            <div class="card">
                <div class="title">🔧 Intervention #${intervention.id}</div>
                <div class="info-row"><span class="label">Équipement</span><span class="value">${intervention.equipement?.nom}</span></div>
                <div class="info-row"><span class="label">Service</span><span class="value">${intervention.equipement?.service}</span></div>
                <div class="info-row"><span class="label">Priorité</span><span class="priority priority-${intervention.signalement?.priorite || 'MOYENNE'}">${intervention.signalement?.priorite || 'NORMALE'}</span></div>
                <div class="info-row"><span class="label">Signalé le</span><span class="value">${new Date(intervention.signalement?.dateSignalement).toLocaleString()}</span></div>
                <div class="info-row"><span class="label">Statut</span><span class="value">${intervention.statut === 'EN_ATTENTE' ? '⏳ En attente' : intervention.statut === 'EN_COURS' ? '🔧 En cours' : '✅ Terminé'}</span></div>
            </div>
            <div class="card">
                <div class="title">📝 Description</div>
                <p>${intervention.signalement?.description || intervention.diagnostic || 'Aucune description'}</p>
            </div>
            ${intervention.statut !== 'TERMINE' ? `
                <div class="card">
                    <div class="title">📋 Actions réalisées</div>
                    <textarea id="actions" rows="3" placeholder="Décrivez les actions effectuées...">${intervention.actionsRealisees || ''}</textarea>
                    <textarea id="rapport" rows="3" placeholder="Rapport final..."></textarea>
                    <input type="number" id="duree" placeholder="Durée (minutes)" value="${intervention.dureeMinutes || ''}">
                    ${intervention.statut === 'EN_ATTENTE' ? `<button class="btn btn-primary" onclick="prendreEnCharge()">✅ Prendre en charge</button>` : ''}
                    ${intervention.statut === 'EN_COURS' ? `<button class="btn btn-success" onclick="terminer()">🏁 Terminer l'intervention</button>` : ''}
                </div>
            ` : `
                <div class="card">
                    <div class="title">📋 Rapport final</div>
                    <p>${intervention.rapportFinal || 'Aucun rapport'}</p>
                    <div class="info-row"><span class="label">Durée</span><span class="value">${intervention.dureeMinutes || 0} minutes</span></div>
                </div>
            `}
        `;
    }
    
    async function prendreEnCharge() {
        const response = await fetch(`${API_URL}/mobile/interventions/${id}/prendre`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if(response.ok) { alert('✅ Intervention prise en charge'); load(); }
        else alert('❌ Erreur');
    }
    
    async function terminer() {
        const actions = document.getElementById('actions').value;
        const rapport = document.getElementById('rapport').value;
        const duree = document.getElementById('duree').value;
        
        const response = await fetch(`${API_URL}/mobile/interventions/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ actionsRealisees: actions, rapportFinal: rapport, dureeMinutes: parseInt(duree), statut: 'TERMINE' })
        });
        if(response.ok) { alert('✅ Intervention terminée'); load(); }
        else alert('❌ Erreur');
    }
    
    if(!token) window.location.href = '/login.html';
    load();
</script>
</body>
</html>
