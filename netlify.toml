[build]
  # Dossier où se trouve votre build (changez selon votre framework)
  publish = "dist"
  # Commande de build (commentez si vous build manuellement)
  command = "npm run build"

# Redirection des appels API vers votre backend Render
[[redirects]]
  from = "/api/*"
  to = "https://gmao-backend.onrender.com/api/:splat"
  status = 200
  force = true

# Redirection SPA (Single Page Application) - crucial pour React/Vue/Angular
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers pour la sécurité (optionnel mais recommandé)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"